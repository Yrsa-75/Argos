<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="irisGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="50%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#1E1B4B"/>
    </radialGradient>
    <radialGradient id="pupilGrad" cx="35%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#818CF8;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="eyeClip">
      <path d="M 20 100 Q 100 30 180 100 Q 100 170 20 100 Z"/>
    </clipPath>
  </defs>
  <ellipse cx="100" cy="100" rx="85" ry="55" fill="url(#glowGrad)" filter="url(#softGlow)"/>
  <path d="M 20 100 Q 100 30 180 100 Q 100 170 20 100 Z" fill="#0F0F1A"/>
  <circle cx="100" cy="100" r="38" fill="url(#irisGrad)" clip-path="url(#eyeClip)"/>
  <circle cx="100" cy="100" r="38" fill="none" stroke="#6366F1" stroke-width="1.5" stroke-opacity="0.4" clip-path="url(#eyeClip)"/>
  <circle cx="100" cy="100" r="30" fill="none" stroke="#818CF8" stroke-width="0.8" stroke-opacity="0.3" clip-path="url(#eyeClip)"/>
  <g clip-path="url(#eyeClip)" opacity="0.25">
    <line x1="100" y1="62" x2="100" y2="138" stroke="#A5B4FC" stroke-width="0.6"/>
    <line x1="63" y1="80" x2="137" y2="120" stroke="#A5B4FC" stroke-width="0.6"/>
    <line x1="63" y1="120" x2="137" y2="80" stroke="#A5B4FC" stroke-width="0.6"/>
    <line x1="62" y1="100" x2="138" y2="100" stroke="#A5B4FC" stroke-width="0.6"/>
  </g>
  <circle cx="100" cy="100" r="20" fill="url(#pupilGrad)" clip-path="url(#eyeClip)"/>
  <circle cx="91" cy="91" r="5" fill="white" opacity="0.6" clip-path="url(#eyeClip)"/>
  <circle cx="108" cy="107" r="2.5" fill="white" opacity="0.25" clip-path="url(#eyeClip)"/>
  <path d="M 20 100 Q 100 30 180 100" fill="none" stroke="#6366F1" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 20 100 Q 100 170 180 100" fill="none" stroke="#4338CA" stroke-width="2" stroke-linecap="round"/>
  <circle cx="20" cy="100" r="3" fill="#818CF8" opacity="0.8"/>
  <circle cx="180" cy="100" r="3" fill="#818CF8" opacity="0.8"/>
  <line x1="80" y1="41" x2="79" y2="30" stroke="#6366F1" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="100" y1="36" x2="100" y2="25" stroke="#6366F1" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="120" y1="41" x2="121" y2="30" stroke="#6366F1" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
</svg>